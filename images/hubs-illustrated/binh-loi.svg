<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 460" role="img" aria-label="Illustrated map of the Bình Lợi hub area, Bình Thạnh">

  <!-- ── cream ground ── -->
  <rect width="720" height="460" fill="#faf6ef"/>

  <!-- ══════════════════════════════════════════
       SAIGON RIVER — upper band, narrower so that
       pins ① (216,156) and ③ (475,193) land on LAND.

       North bank ~y 32–48 (varies gently)
       South bank ~y 130–145 (passes through roughly y=138 at x=374)
       so that:
         • pin ① (216,156) = bridge south foot, on LAND just below bank
         • pin ② (374,239) = riverbank viewing point — land side (y=239 well south)
         • pin ③ (475,193) = on LAND, clearly south of bank
         • eat (288,304) = on LAND lower-left
       The bridge spans the river at a gentle diagonal from
       upper-left to upper-right, heroically filling the top third.
  ══════════════════════════════════════════ -->

  <!-- River fill body -->
  <path d="M 0,40
           C 120,32 260,30 400,36
           C 520,42 620,44 720,42
           L 720,0 L 0,0 Z"
        fill="#aebfc6" opacity="0.42"/>

  <!-- River body between north and south banks -->
  <path d="M 0,40
           C 120,32 260,30 400,36
           C 520,42 620,44 720,42
           L 720,148
           C 620,150 520,148 400,142
           C 280,136 140,134 0,140 Z"
        fill="#aebfc6" opacity="0.55"/>

  <!-- Current lines — gentle horizontal streaks across the river -->
  <path d="M 20,62 C 120,58 250,60 400,64 C 520,68 640,66 710,64"
        fill="none" stroke="#c7d2d7" stroke-width="1.3" stroke-linecap="round" opacity="0.70"/>
  <path d="M 10,82 C 120,78 260,80 420,84 C 560,88 660,86 715,85"
        fill="none" stroke="#c7d2d7" stroke-width="1.0" stroke-linecap="round" opacity="0.55"/>
  <path d="M 30,104 C 130,100 280,102 430,106 C 580,110 660,108 715,108"
        fill="none" stroke="#c7d2d7" stroke-width="0.9" stroke-linecap="round" opacity="0.42"/>

  <!-- North bank edge (faint ink) -->
  <path d="M 0,40
           C 120,32 260,30 400,36
           C 520,42 620,44 720,42"
        fill="none" stroke="#1d1a16" stroke-width="1.0" stroke-linecap="round" opacity="0.38"/>

  <!-- South / Bình Thạnh shoreline — the KEY edge -->
  <!-- Passes through roughly (374,138) so pin ② at (374,239) is safely on land -->
  <path d="M 0,140
           C 80,136 160,134 240,136
           C 320,138 374,140 440,142
           C 520,144 620,146 720,148"
        fill="none" stroke="#1d1a16" stroke-width="2.2" stroke-linecap="round" opacity="0.75"/>

  <!-- ══════════════════════════════════════════
       HERO: 1902 BÌNH LỢI RAILWAY TRUSS BRIDGE
       Spans the river as the dominant composition element.
       Bridge nearly horizontal, gentle slope left→right.
       South (land) foot of bridge ~(216,128) — just inside or at the south bank,
       so that ① pin at (216,156) reads as "bridge approach / south embankment".
       9 bays across the full width x=60→660.

       Anatomy:
         bottom chord (deck line): x60,y126 → x660,y118
         top chord:                x60,y98  → x660,y90
         verticals: 10 posts at ~67px intervals
         X diagonals within each bay
  ══════════════════════════════════════════ -->

  <!-- Terracotta warm under-glow on the hero bridge -->
  <line x1="60" y1="122" x2="660" y2="114"
        stroke="#c0532a" stroke-width="18" stroke-linecap="round" opacity="0.09"/>
  <line x1="60" y1="122" x2="660" y2="114"
        stroke="#c0532a" stroke-width="7" stroke-linecap="round" opacity="0.16"/>

  <!-- Bottom chord / deck line -->
  <line x1="60" y1="126" x2="660" y2="118"
        stroke="#1d1a16" stroke-width="4.8" stroke-linecap="round" opacity="0.92"/>
  <!-- Deck parallel rails -->
  <line x1="60" y1="120" x2="660" y2="112"
        stroke="#1d1a16" stroke-width="1.5" stroke-linecap="round" opacity="0.42"/>
  <line x1="60" y1="132" x2="660" y2="124"
        stroke="#1d1a16" stroke-width="1.5" stroke-linecap="round" opacity="0.42"/>

  <!-- Top chord -->
  <line x1="60" y1="98" x2="660" y2="90"
        stroke="#1d1a16" stroke-width="3.2" stroke-linecap="round" opacity="0.88"/>

  <!-- Vertical posts — 10 posts, spacing ~66px -->
  <line x1="60"  y1="98"  x2="60"  y2="126" stroke="#1d1a16" stroke-width="2.4" stroke-linecap="round"/>
  <line x1="126" y1="97"  x2="126" y2="125" stroke="#1d1a16" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="192" y1="96"  x2="192" y2="124" stroke="#1d1a16" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="258" y1="95"  x2="258" y2="123" stroke="#1d1a16" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="324" y1="94"  x2="324" y2="122" stroke="#1d1a16" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="390" y1="93"  x2="390" y2="121" stroke="#1d1a16" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="456" y1="92"  x2="456" y2="120" stroke="#1d1a16" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="522" y1="91"  x2="522" y2="119" stroke="#1d1a16" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="588" y1="90"  x2="588" y2="118" stroke="#1d1a16" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="660" y1="90"  x2="660" y2="118" stroke="#1d1a16" stroke-width="2.4" stroke-linecap="round"/>

  <!-- X diagonals — each bay -->
  <!-- Bay 1: 60→126 -->
  <line x1="60"  y1="98"  x2="126" y2="125" stroke="#1d1a16" stroke-width="1.4" stroke-linecap="round" opacity="0.70"/>
  <line x1="60"  y1="126" x2="126" y2="97"  stroke="#1d1a16" stroke-width="1.4" stroke-linecap="round" opacity="0.70"/>
  <!-- Bay 2: 126→192 -->
  <line x1="126" y1="97"  x2="192" y2="124" stroke="#1d1a16" stroke-width="1.4" stroke-linecap="round" opacity="0.70"/>
  <line x1="126" y1="125" x2="192" y2="96"  stroke="#1d1a16" stroke-width="1.4" stroke-linecap="round" opacity="0.70"/>
  <!-- Bay 3: 192→258 -->
  <line x1="192" y1="96"  x2="258" y2="123" stroke="#1d1a16" stroke-width="1.4" stroke-linecap="round" opacity="0.70"/>
  <line x1="192" y1="124" x2="258" y2="95"  stroke="#1d1a16" stroke-width="1.4" stroke-linecap="round" opacity="0.70"/>
  <!-- Bay 4: 258→324 -->
  <line x1="258" y1="95"  x2="324" y2="122" stroke="#1d1a16" stroke-width="1.4" stroke-linecap="round" opacity="0.70"/>
  <line x1="258" y1="123" x2="324" y2="94"  stroke="#1d1a16" stroke-width="1.4" stroke-linecap="round" opacity="0.70"/>
  <!-- Bay 5: 324→390 -->
  <line x1="324" y1="94"  x2="390" y2="121" stroke="#1d1a16" stroke-width="1.4" stroke-linecap="round" opacity="0.70"/>
  <line x1="324" y1="122" x2="390" y2="93"  stroke="#1d1a16" stroke-width="1.4" stroke-linecap="round" opacity="0.70"/>
  <!-- Bay 6: 390→456 -->
  <line x1="390" y1="93"  x2="456" y2="120" stroke="#1d1a16" stroke-width="1.4" stroke-linecap="round" opacity="0.70"/>
  <line x1="390" y1="121" x2="456" y2="92"  stroke="#1d1a16" stroke-width="1.4" stroke-linecap="round" opacity="0.70"/>
  <!-- Bay 7: 456→522 -->
  <line x1="456" y1="92"  x2="522" y2="119" stroke="#1d1a16" stroke-width="1.4" stroke-linecap="round" opacity="0.70"/>
  <line x1="456" y1="120" x2="522" y2="91"  stroke="#1d1a16" stroke-width="1.4" stroke-linecap="round" opacity="0.70"/>
  <!-- Bay 8: 522→588 -->
  <line x1="522" y1="91"  x2="588" y2="118" stroke="#1d1a16" stroke-width="1.4" stroke-linecap="round" opacity="0.70"/>
  <line x1="522" y1="119" x2="588" y2="90"  stroke="#1d1a16" stroke-width="1.4" stroke-linecap="round" opacity="0.70"/>
  <!-- Bay 9: 588→660 -->
  <line x1="588" y1="90"  x2="660" y2="118" stroke="#1d1a16" stroke-width="1.4" stroke-linecap="round" opacity="0.70"/>
  <line x1="588" y1="118" x2="660" y2="90"  stroke="#1d1a16" stroke-width="1.4" stroke-linecap="round" opacity="0.70"/>

  <!-- Masonry abutments at each end -->
  <rect x="44" y="122" width="30" height="18" rx="2"
        fill="#d4ccc0" stroke="#1d1a16" stroke-width="1.2" opacity="0.72"/>
  <rect x="646" y="114" width="30" height="18" rx="2"
        fill="#d4ccc0" stroke="#1d1a16" stroke-width="1.2" opacity="0.72"/>

  <!-- Approach embankment from south abutment down to land -->
  <!-- Left (west) embankment from ~(60,140) south to land — just below shore -->
  <path d="M 59,140 C 60,148 61,158 62,172"
        fill="none" stroke="#1d1a16" stroke-width="2.0" stroke-linecap="round" opacity="0.55"/>
  <!-- Embankment fill suggestion -->
  <path d="M 44,140 C 44,148 44,158 44,172 C 44,178 74,178 74,172 C 74,158 74,148 74,140 Z"
        fill="#d4ccc0" opacity="0.28"/>

  <!-- Right embankment (east side) -->
  <path d="M 661,132 C 662,142 663,155 664,170"
        fill="none" stroke="#1d1a16" stroke-width="2.0" stroke-linecap="round" opacity="0.55"/>
  <path d="M 646,132 C 646,145 646,158 646,172 C 646,178 676,178 676,172 C 676,158 676,145 676,132 Z"
        fill="#d4ccc0" opacity="0.28"/>

  <!-- ── Newer road bridge (simpler, no truss) — hint as thin parallel lines ~26px south -->
  <line x1="60" y1="152" x2="660" y2="144"
        stroke="#1d1a16" stroke-width="3.0" stroke-linecap="round" opacity="0.28"/>
  <line x1="60" y1="146" x2="660" y2="138"
        stroke="#1d1a16" stroke-width="0.8" stroke-linecap="round" opacity="0.16"/>
  <line x1="60" y1="158" x2="660" y2="150"
        stroke="#1d1a16" stroke-width="0.8" stroke-linecap="round" opacity="0.16"/>

  <!-- ══════════════════════════════════════════
       SMALL BOAT — moored near west bank, mid-river
       Adds life and scale to the water
  ══════════════════════════════════════════ -->
  <path d="M 148,78 C 152,74 170,72 186,74 C 200,76 206,80 204,84
           C 200,88 154,88 150,84 Z"
        fill="#e8e0d0" stroke="#1d1a16" stroke-width="1.2" stroke-linecap="round" opacity="0.68"/>
  <rect x="162" y="68" width="18" height="8" rx="2"
        fill="#d4ccc0" stroke="#1d1a16" stroke-width="0.9" opacity="0.52"/>

  <!-- ══════════════════════════════════════════
       STREETS — land side, south of the river (y > ~145)
       3–4 principal streets, confident ink strokes.

       Pin zones:
         ① (216,156) — bridge south foot / approach road
         ② (374,239) — riverbank viewing point (at the shore edge)
         ③ (475,193) — 12ThángCoffee, on land, right-of-centre
         eat (288,304) — Dì Loan Quán, lower-left land
  ══════════════════════════════════════════ -->

  <!-- Main embankment road — runs E–W just below the south bank, ~y=160–175 -->
  <!-- Connects bridge foot area (①) through ③ zone -->
  <path d="M 30,168
           C 110,164 200,162 290,164
           C 380,166 460,170 560,172
           C 620,173 670,174 710,175"
        fill="none" stroke="#1d1a16" stroke-width="2.6" stroke-linecap="round" opacity="0.82"/>

  <!-- Parallel lane (riverbank path, slightly south) -->
  <path d="M 30,182
           C 110,178 200,176 290,178
           C 380,180 460,184 560,186
           C 640,188 700,190 720,191"
        fill="none" stroke="#1d1a16" stroke-width="1.4" stroke-linecap="round" opacity="0.48"/>

  <!-- Main north-south boulevard running south from bridge left foot (①) -->
  <!-- from ~(216,160) south through the frame -->
  <path d="M 216,158 C 218,196 220,240 222,284 C 224,330 224,382 224,440"
        fill="none" stroke="#1d1a16" stroke-width="2.8" stroke-linecap="round" opacity="0.85"/>

  <!-- Secondary N-S road east of the bridge, reaches ③ and toward eat -->
  <path d="M 290,180 C 290,218 288,260 288,304 C 288,348 288,400 288,450"
        fill="none" stroke="#1d1a16" stroke-width="1.8" stroke-linecap="round" opacity="0.62"/>

  <!-- Cross street E–W running through the land interior (~y=270), near eat -->
  <path d="M 80,272
           C 160,266 230,262 300,262
           C 380,262 460,264 560,266
           C 630,268 680,270 720,272"
        fill="none" stroke="#1d1a16" stroke-width="1.8" stroke-linecap="round" opacity="0.62"/>

  <!-- Alley (hẻm) from eat zone northward to the embankment road -->
  <path d="M 288,180 C 288,200 288,222 288,244"
        fill="none" stroke="#1d1a16" stroke-width="1.1" stroke-linecap="round" opacity="0.42"/>

  <!-- ══════════════════════════════════════════
       VEGETATION — muted green soft blobs
       Like pho.svg herbs: organic, quiet
  ══════════════════════════════════════════ -->

  <!-- Tree cluster near bridge south approach (west side of ①) -->
  <ellipse cx="152" cy="176" rx="16" ry="10" fill="#7e9b86" opacity="0.32"/>
  <ellipse cx="140" cy="184" rx="11" ry="8"  fill="#7e9b86" opacity="0.26"/>
  <ellipse cx="162" cy="187" rx="9"  ry="7"  fill="#6a8a74" opacity="0.24"/>

  <!-- Riverbank fringe near ② viewing point (374,239) — just above the shore -->
  <ellipse cx="350" cy="152" rx="10" ry="6" fill="#7e9b86" opacity="0.26"/>
  <ellipse cx="366" cy="148" rx="8"  ry="5" fill="#6a8a74" opacity="0.22"/>
  <ellipse cx="382" cy="154" rx="9"  ry="6" fill="#7e9b86" opacity="0.24"/>

  <!-- Tree cluster east, near ③ zone on land -->
  <ellipse cx="506" cy="200" rx="14" ry="9" fill="#7e9b86" opacity="0.28"/>
  <ellipse cx="494" cy="208" rx="9"  ry="7" fill="#6a8a74" opacity="0.24"/>
  <ellipse cx="518" cy="210" rx="8"  ry="6" fill="#7e9b86" opacity="0.22"/>

  <!-- Sparse cluster near eat pin (288,304) — east side of N-S road -->
  <ellipse cx="316" cy="284" rx="10" ry="7" fill="#7e9b86" opacity="0.24"/>
  <ellipse cx="306" cy="292" rx="7"  ry="5" fill="#6a8a74" opacity="0.20"/>

  <!-- ══════════════════════════════════════════
       QUIET LAND TEXTURE — faint block hatching
       suggesting the built neighbourhood grain
  ══════════════════════════════════════════ -->
  <line x1="360" y1="310" x2="440" y2="310" stroke="#1d1a16" stroke-width="0.5" opacity="0.13"/>
  <line x1="360" y1="322" x2="440" y2="322" stroke="#1d1a16" stroke-width="0.5" opacity="0.13"/>
  <line x1="360" y1="334" x2="440" y2="334" stroke="#1d1a16" stroke-width="0.5" opacity="0.11"/>
  <line x1="360" y1="346" x2="440" y2="346" stroke="#1d1a16" stroke-width="0.5" opacity="0.11"/>

  <line x1="140" y1="340" x2="210" y2="340" stroke="#1d1a16" stroke-width="0.5" opacity="0.13"/>
  <line x1="140" y1="352" x2="210" y2="352" stroke="#1d1a16" stroke-width="0.5" opacity="0.11"/>
  <line x1="140" y1="364" x2="210" y2="364" stroke="#1d1a16" stroke-width="0.5" opacity="0.10"/>

  <line x1="510" y1="338" x2="590" y2="338" stroke="#1d1a16" stroke-width="0.5" opacity="0.12"/>
  <line x1="510" y1="350" x2="590" y2="350" stroke="#1d1a16" stroke-width="0.5" opacity="0.10"/>
  <line x1="510" y1="362" x2="590" y2="362" stroke="#1d1a16" stroke-width="0.5" opacity="0.09"/>

  <!-- ══════════════════════════════════════════
       NORTH ARROW — quiet compass hint, top-right
  ══════════════════════════════════════════ -->
  <g transform="translate(688,38)" opacity="0.55">
    <line x1="0" y1="14" x2="0" y2="-14" stroke="#1d1a16" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="-7" y1="2"  x2="0" y2="-14" stroke="#1d1a16" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="7"  y1="2"  x2="0" y2="-14" stroke="#1d1a16" stroke-width="1.4" stroke-linecap="round"/>
  </g>

</svg>
