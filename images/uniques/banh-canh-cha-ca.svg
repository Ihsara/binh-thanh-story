<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" aria-hidden="true">
  <!-- paper background -->
  <rect width="120" height="120" fill="#f7f3ea"/>
  <!-- bowl -->
  <path d="M18,72 Q60,105 102,72" fill="none" stroke="#1d1a16" stroke-width="2" stroke-linecap="round"/>
  <line x1="18" y1="72" x2="18" y2="86" stroke="#1d1a16" stroke-width="2" stroke-linecap="round"/>
  <line x1="102" y1="72" x2="102" y2="86" stroke="#1d1a16" stroke-width="2" stroke-linecap="round"/>
  <path d="M18,86 Q60,112 102,86" fill="#e4ddcf" stroke="#1d1a16" stroke-width="1.5"/>
  <!-- rim -->
  <path d="M14,72 Q60,80 106,72" fill="none" stroke="#8a8175" stroke-width="1.2"/>
  <!-- thick noodles in broth (bánh canh are wide, tubular) -->
  <path d="M28,76 Q40,72 52,76 Q60,79 68,75 Q76,71 84,75" fill="none" stroke="#c99a2e" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
  <path d="M30,82 Q45,78 58,82 Q70,86 82,80" fill="none" stroke="#c99a2e" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <!-- fish cake slice (chả cá — oval patty with cross-hatch) -->
  <ellipse cx="70" cy="74" rx="12" ry="7" fill="#f7f3ea" stroke="#c0532a" stroke-width="1.5"/>
  <line x1="64" y1="71" x2="76" y2="71" stroke="#c0532a" stroke-width="1" opacity="0.6"/>
  <line x1="62" y1="74" x2="78" y2="74" stroke="#c0532a" stroke-width="1" opacity="0.6"/>
  <line x1="64" y1="77" x2="76" y2="77" stroke="#c0532a" stroke-width="1" opacity="0.6"/>
  <!-- steam wisps -->
  <path d="M42,68 C40,56 46,50 44,38" fill="none" stroke="#c0532a" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M60,64 C58,52 64,46 62,34" fill="none" stroke="#c0532a" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M78,68 C76,56 82,50 80,38" fill="none" stroke="#c0532a" stroke-width="1.5" stroke-linecap="round"/>
  <!-- spoon (ladle) -->
  <path d="M96,56 Q102,62 98,70" fill="none" stroke="#1d1a16" stroke-width="1.5" stroke-linecap="round"/>
  <ellipse cx="98" cy="71" rx="4" ry="3" fill="none" stroke="#1d1a16" stroke-width="1.2"/>
</svg>
