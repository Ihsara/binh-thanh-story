<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" aria-hidden="true">
  <!-- paper background -->
  <rect width="120" height="120" fill="#f7f3ea"/>
  <!-- bowl base (deep stew bowl) -->
  <path d="M22,75 Q60,105 98,75" fill="none" stroke="#1d1a16" stroke-width="2" stroke-linecap="round"/>
  <line x1="22" y1="75" x2="22" y2="88" stroke="#1d1a16" stroke-width="2" stroke-linecap="round"/>
  <line x1="98" y1="75" x2="98" y2="88" stroke="#1d1a16" stroke-width="2" stroke-linecap="round"/>
  <path d="M22,88 Q60,112 98,88" fill="#e4ddcf" stroke="#1d1a16" stroke-width="1.5"/>
  <!-- rim -->
  <path d="M18,75 Q60,83 102,75" fill="none" stroke="#8a8175" stroke-width="1.2"/>
  <!-- broth surface with a dark morsel (duck) -->
  <ellipse cx="60" cy="78" rx="28" ry="6" fill="#c0532a" opacity="0.12"/>
  <ellipse cx="48" cy="80" rx="7" ry="4" fill="#c0532a" opacity="0.55"/>
  <ellipse cx="68" cy="77" rx="5" ry="3" fill="#8a8175" opacity="0.5"/>
  <!-- coconut-milk droplets hinting at the coconut base -->
  <circle cx="60" cy="79" r="2" fill="#f7f3ea" opacity="0.7"/>
  <!-- steam wisps -->
  <path d="M44,72 C42,60 47,55 45,43" fill="none" stroke="#c0532a" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M60,68 C58,55 63,50 61,38" fill="none" stroke="#c0532a" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M76,72 C74,60 79,55 77,43" fill="none" stroke="#c0532a" stroke-width="1.5" stroke-linecap="round"/>
  <!-- chopsticks resting on the bowl -->
  <line x1="30" y1="62" x2="90" y2="58" stroke="#1d1a16" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="30" y1="67" x2="90" y2="63" stroke="#1d1a16" stroke-width="1.5" stroke-linecap="round"/>
</svg>
