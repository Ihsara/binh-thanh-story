<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" aria-hidden="true">
  <!-- paper background -->
  <rect width="120" height="120" fill="#f7f3ea"/>
  <!-- grill grate -->
  <rect x="18" y="78" width="84" height="6" rx="2" fill="#8a8175" opacity="0.5"/>
  <line x1="32" y1="78" x2="32" y2="84" stroke="#8a8175" stroke-width="2"/>
  <line x1="48" y1="78" x2="48" y2="84" stroke="#8a8175" stroke-width="2"/>
  <line x1="64" y1="78" x2="64" y2="84" stroke="#8a8175" stroke-width="2"/>
  <line x1="80" y1="78" x2="80" y2="84" stroke="#8a8175" stroke-width="2"/>
  <!-- charcoal glow -->
  <ellipse cx="60" cy="90" rx="34" ry="8" fill="#c0532a" opacity="0.18"/>
  <ellipse cx="42" cy="90" rx="8" ry="4" fill="#c99a2e" opacity="0.25"/>
  <ellipse cx="72" cy="90" rx="10" ry="4" fill="#c0532a" opacity="0.2"/>
  <!-- skewer rod (diagonal, prominent) -->
  <line x1="14" y1="85" x2="106" y2="35" stroke="#1d1a16" stroke-width="2.5" stroke-linecap="round"/>
  <!-- octopus body (mantle — oval) -->
  <ellipse cx="60" cy="62" rx="18" ry="13" fill="#f7f3ea" stroke="#c0532a" stroke-width="2"/>
  <!-- grill char marks on the mantle -->
  <path d="M46,57 Q52,60 48,65" fill="none" stroke="#1d1a16" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <path d="M64,55 Q70,58 66,63" fill="none" stroke="#1d1a16" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <!-- tentacles (8 curling lines from the base of the mantle) -->
  <path d="M50,73 Q44,82 46,90" fill="none" stroke="#c0532a" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M55,75 Q52,86 50,93" fill="none" stroke="#c0532a" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M60,76 Q60,87 58,95" fill="none" stroke="#c0532a" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M65,75 Q68,86 66,92" fill="none" stroke="#c0532a" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M70,73 Q76,82 74,89" fill="none" stroke="#c0532a" stroke-width="1.5" stroke-linecap="round"/>
  <!-- eyes (dots on mantle) -->
  <circle cx="53" cy="60" r="2" fill="#1d1a16"/>
  <circle cx="67" cy="60" r="2" fill="#1d1a16"/>
  <!-- smoke wisps -->
  <path d="M40,72 C38,62 44,57 42,47" fill="none" stroke="#8a8175" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <path d="M60,68 C58,58 64,52 62,42" fill="none" stroke="#8a8175" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <path d="M80,72 C78,62 84,57 82,47" fill="none" stroke="#8a8175" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
</svg>
